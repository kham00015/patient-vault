# Production stack: Patient Vault + Caddy (HTTPS)
# On Lightsail: docker compose -f docker-compose.production.yml up -d --build

services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env.production
    expose:
      - "3000"
    volumes:
      - app_storage:/app/storage

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_HOSTNAME: ${APP_HOSTNAME:-app.patientvault.care}
      ACME_EMAIL: ${ACME_EMAIL:-}
    env_file: .env.production
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  app_storage:
  caddy_data:
  caddy_config:
